replicaCount: 1

image:
  repository: cosmoparrot
  tag: latest
  pullPolicy: IfNotPresent

service:
  name: cosmoparrot
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  host: cosmoparrot.example.com
  className:
  annotations:
  tls:
    enabled: false
    secretName: cosmoparrot-tls

resources:
  limits:
    cpu: "1"
    memory: "512Mi"
  requests:
    cpu: "0.5"
    memory: "256Mi"

cosmoparrot:
  # Log every incoming request (line, headers and body).
  # Set to false to disable per-request logging.
  requestLogging: true
  storeKeyRequestHeaders: []
  # Example:
  # storeKeyRequestHeaders:
  #   - X-Request-ID
  #   - X-Correlation-ID
  otel:
    enabled: false
    serviceName: cosmoparrot
    # Configure standard OTEL exporter environment variables.
    env:
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      # Example endpoint for an in-cluster collector service.
      # For traces, OTEL_EXPORTER_OTLP_TRACES_ENDPOINT takes precedence over OTEL_EXPORTER_OTLP_ENDPOINT.
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ""
      OTEL_EXPORTER_OTLP_TIMEOUT: ""
      OTEL_EXPORTER_OTLP_TRACES_TIMEOUT: ""
      OTEL_EXPORTER_OTLP_INSECURE: ""
      OTEL_EXPORTER_OTLP_TRACES_INSECURE: ""

imagePullSecrets: []

podAnnotations: {}

affinity:
  nodeAffinity: []
